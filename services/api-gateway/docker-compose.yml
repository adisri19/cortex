version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kiddo
      POSTGRES_USER: kiddo_user
      POSTGRES_PASSWORD: kiddo_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../../database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
